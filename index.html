<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotary Club of Redding &mdash; Team Tracker 26/27</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #07091a; color: #e6edf3; min-height: 100vh; padding: 1.25rem 1.5rem 2rem; }
    .container { max-width: 1400px; margin: 0 auto; position: relative; }
    .starfield { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle 3s infinite alternate; }
    @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.9; } }
    .hero { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; margin-bottom: 1.25rem; background: linear-gradient(135deg, rgba(10,14,42,0.7) 0%, rgba(17,26,62,0.7) 60%, rgba(26,10,10,0.7) 100%); border-radius: 14px; border: 1px solid rgba(186,117,23,0.2); }
    .hero-text { text-align: left; }
    .org-label { font-size: 20px; font-weight: 700; letter-spacing: 0.1em; color: #c9923a; text-transform: uppercase; margin-bottom: 4px; }
    .hero-title { font-size: 26px; font-weight: 600; color: #f5e6c8; margin-bottom: 3px; }
    .hero-sub { font-size: 14px; color: #8a9bb8; }
    .rotary-wheel { width: 80px; height: 80px; animation: spin 18s linear infinite; display: block; flex-shrink: 0; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .controls-row { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 12px; flex-wrap: wrap; }
    .controls-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .edit-badge { display: inline-flex; align-items: center; gap: 7px; font-size: 14px; padding: 5px 14px; border-radius: 8px; background: rgba(186,117,23,0.15); color: #c9923a; font-weight: 600; border: 1px solid rgba(186,117,23,0.35); }
    .sync-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; padding: 5px 12px; border-radius: 8px; color: #4ade80; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); }
    .sync-badge.syncing { color: #facc15; background: rgba(250,204,21,0.1); border-color: rgba(250,204,21,0.25); }
    .sync-badge.error { color: #f87171; background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.25); }
    .sync-badge.setup { color: #94a3b8; background: rgba(148,163,184,0.1); border-color: rgba(148,163,184,0.2); }
    .connect-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; padding: 5px 12px; border-radius: 8px; background: rgba(99,102,241,0.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); cursor: pointer; }
    .connect-btn:hover { background: rgba(99,102,241,0.22); }
    .lock-btn { display: flex; align-items: center; gap: 8px; padding: 8px 18px; border: 1px solid rgba(255,255,255,0.18); border-radius: 8px; background: rgba(255,255,255,0.06); cursor: pointer; font-size: 15px; color: #8a9bb8; transition: background 0.15s; }
    .lock-btn:hover { background: rgba(255,255,255,0.12); color: #e6edf3; }
    .panel { position: relative; z-index: 1; background: rgba(10,14,34,0.88); border: 1px solid rgba(255,255,255,0.09); border-radius: 14px; overflow: hidden; width: 100%; }
    .panel-header { background: #0f1535; padding: 12px 20px; border-bottom: 1px solid rgba(138,155,184,0.15); }
    .panel-header p { font-size: 13px; font-weight: 600; color: #c9923a; text-transform: uppercase; letter-spacing: .14em; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    col.label-col { width: 24%; }
    th { font-size: 15px; font-weight: 600; color: #8a9bb8; padding: 13px 10px; text-align: center; border-bottom: 1px solid rgba(138,155,184,0.15); letter-spacing: .04em; white-space: nowrap; }
    th.lth { text-align: left; color: #c9923a; padding-left: 20px; font-size: 13px; }
    td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; color: #e6edf3; vertical-align: middle; font-size: 17px; }
    td.ltd { text-align: left; color: #8a9bb8; padding-left: 20px; font-size: 15px; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    tr:last-child td { border-bottom: none; }
    tr.tot-row td { font-weight: 700; background: rgba(186,117,23,0.12); color: #f0c060; border-top: 1px solid rgba(186,117,23,0.3); border-bottom: 1px solid rgba(186,117,23,0.3); font-size: 19px; padding: 14px 10px; }
    tr.tot-row td.ltd { color: #f0c060; font-size: 17px; }
    tr.cmd-row td { background: rgba(186,117,23,0.07); border-bottom: 1px solid rgba(186,117,23,0.15); padding: 11px 10px; }
    tr.cmd-row td.ltd { color: #c9923a; font-weight: 600; font-size: 15px; }
    tr.cmd-row:last-child td { border-bottom: none; }
    input.score-input { width: 75%; max-width: 90px; padding: 6px 8px; text-align: center; border-radius: 7px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.07); color: #e6edf3; font-size: 15px; font-family: inherit; }
    input.score-input:focus { outline: none; border-color: #c9923a; }
    input.cmd-input { width: 90%; max-width: 130px; padding: 6px 8px; border-radius: 7px; border: 1px solid rgba(186,117,23,0.35); background: rgba(186,117,23,0.07); color: #e6edf3; font-size: 14px; font-family: inherit; }
    input.cmd-input:focus { outline: none; border-color: #c9923a; }
    .cmd-val { font-size: 15px; color: #a07830; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; align-items: center; justify-content: center; }
    .modal-box { background: #161b22; border: 1px solid rgba(186,117,23,0.3); border-radius: 14px; padding: 2rem; width: 360px; }
    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 14px; color: #f5e6c8; }
    .modal-box input[type=password], .modal-box input[type=text] { width: 100%; padding: 10px 12px; margin-bottom: 12px; background: #0d1117; border: 1px solid rgba(255,255,255,0.18); border-radius: 8px; color: #e6edf3; font-size: 14px; }
    .modal-box input:focus { outline: none; border-color: #c9923a; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-primary { padding: 8px 20px; border-radius: 8px; border: 1px solid #c9923a; background: rgba(186,117,23,0.15); cursor: pointer; font-size: 14px; color: #f0c060; font-weight: 600; }
    .btn-primary:hover { background: rgba(186,117,23,0.28); }
    .btn-cancel { padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: transparent; cursor: pointer; font-size: 14px; color: #8a9bb8; }
    .error-msg { font-size: 13px; color: #f97583; margin-bottom: 10px; }
    .modal-hint { font-size: 12px; color: #8a9bb8; margin-bottom: 12px; line-height: 1.6; }
    .current-url { font-size: 11px; color: #555d6b; margin-bottom: 10px; word-break: break-all; }
    .dl-row { position: relative; z-index: 1; display: flex; justify-content: flex-end; margin-top: 1rem; }
    .dl-btn { display: flex; align-items: center; gap: 7px; padding: 8px 18px; border: 1px solid rgba(255,255,255,0.18); border-radius: 8px; background: rgba(255,255,255,0.06); cursor: pointer; font-size: 14px; color: #8a9bb8; }
    .dl-btn:hover { background: rgba(255,255,255,0.12); color: #e6edf3; }
    footer { position: relative; z-index: 1; text-align: center; margin-top: 2rem; font-size: 12px; color: #2e3650; letter-spacing: 0.06em; }
  </style>

    window[cbName] = function(data) {
      clearTimeout(timeout);
      delete window[cbName];
      var old = document.getElementById('jsonp-script');
      if (old) old.parentNode.removeChild(old);
      if (callback) callback(data);
    };
    var script = document.createElement('script');
    script.id = 'jsonp-script';
    script.src = url + '&callback=' + cbName;
    script.onerror = function() {
      clearTimeout(timeout);
      setSyncBadge('error', 'failed — check script URL');
    };
    document.head.appendChild(script);
  }

  function loadFromSheets() {
    setSyncBadge('syncing', 'loading...');
    jsonp(scriptUrl + '?action=get', function(data) {
      if (data.scores) scores = data.scores;
      if (data.commanders) commanders = data.commanders;
      render();
      var t = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      setSyncBadge('saved', 'synced ' + t);
    });
  }

  function saveToSheets() {
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(function() {
      setSyncBadge('syncing', 'saving...');
      var payload = JSON.stringify({ scores: scores, commanders: commanders });
      var encoded = encodeURIComponent(payload);
      jsonp(scriptUrl + '?action=save&data=' + encoded, function(data) {
        var t = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        setSyncBadge('saved', 'saved ' + t);
      });
    }, 1000);
  }

  function startAutoRefresh() {
    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(function() { if (!isEditor) loadFromSheets(); }, 30000);
  }

  function render() {
    var tb = document.getElementById('tbody');
    tb.innerHTML = '';
    scoreRows.forEach(function(r) {
      var tr = document.createElement('tr');
      var h = '<td class="ltd">' + r.label + '</td>';
      for (var t = 0; t < NT; t++) {
        var v = scores[r.key][t];
        if (isEditor) {
          h += '<td><input class="score-input" type="number" min="0" step="0.5" value="' + v + '" data-key="' + r.key + '" data-t="' + t + '" onchange="setScore(this.dataset.key, parseInt(this.dataset.t), this.value)"/></td>';
        } else {
          h += '<td>' + fmt(v) + '</td>';
        }
      }
      tr.innerHTML = h;
      tb.appendChild(tr);
    });
    var tot = document.createElement('tr');
    tot.className = 'tot-row';
    var th = '<td class="ltd">Total Score</td>';
    for (var t = 0; t < NT; t++) {
      th += '<td id="tot-' + t + '">' + (Math.round(total(t) * 10) / 10) + '</td>';
    }
    tot.innerHTML = th;
    tb.appendChild(tot);
    for (var c = 0; c < 2; c++) {
      var cr = document.createElement('tr');
      cr.className = 'cmd-row';
      var ch = '<td class="ltd">&#128081; Commander ' + (c + 1) + '</td>';
      for (var t = 0; t < NT; t++) {
        var nm = commanders[c][t];
        if (isEditor) {
          ch += '<td><input class="cmd-input" type="text" placeholder="Name" value="' + nm + '" data-c="' + c + '" data-t="' + t + '" onchange="setCommander(parseInt(this.dataset.c), parseInt(this.dataset.t), this.value)"/></td>';
        } else {
          ch += '<td><span class="cmd-val">' + (nm || '&mdash;') + '</span></td>';
        }
      }
      cr.innerHTML = ch;
      tb.appendChild(cr);
    }
  }

  function setScore(key, t, v) {
    scores[key][t] = parseFloat(v) || 0;
    var el = document.getElementById('tot-' + t);
    if (el) el.textContent = Math.round(total(t) * 10) / 10;
    saveToSheets();
  }
  function setCommander(c, t, v) { commanders[c][t] = v; saveToSheets(); }

  function handleLock() {
    if (isEditor) {
      isEditor = false;
      document.getElementById('edit-badge').style.display = 'none';
      document.getElementById('lock-icon').innerHTML = '&#128274;';
      document.getElementById('lock-label').textContent = 'unlock to edit';
      document.getElementById('dl-row').style.display = 'none';
      render();
    } else {
      document.getElementById('pw-error').style.display = 'none';
      document.getElementById('pw-input').value = '';
      document.getElementById('modal').style.display = 'flex';
      setTimeout(function() { document.getElementById('pw-input').focus(); }, 80);
    }
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }
  function submitPw() {
    if (document.getElementById('pw-input').value === PASS) {
      isEditor = true;
      closeModal();
      document.getElementById('edit-badge').style.display = 'inline-flex';
      document.getElementById('lock-icon').innerHTML = '&#128275;';
      document.getElementById('lock-label').textContent = 'lock editing';
      document.getElementById('dl-row').style.display = 'flex';
      render();
    } else {
      document.getElementById('pw-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  function downloadCSV() {
    var c = 'Team Goals,Team 1,Team 2,Team 3,Team 4,Team 5,Team 6\n';
    scoreRows.forEach(function(r) { c += '"' + r.label + '",' + scores[r.key].join(',') + '\n'; });
    c += 'Total Score,' + Array.from({length:NT}, function(_,t){ return Math.round(total(t)*10)/10; }).join(',') + '\n';
    c += 'Commander 1,' + commanders[0].join(',') + '\nCommander 2,' + commanders[1].join(',') + '\n';
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([c], {type:'text/csv'}));
    a.download = 'redding_rotary_team_tracker.csv';
    a.click();
  }

  (function makeStars() {
    var sf = document.getElementById('starfield');
    for (var i = 0; i < 150; i++) {
      var s = document.createElement('div');
      s.className = 'star';
      var sz = Math.random() * 2.8 + 0.4;
      var css = 'width:' + sz + 'px;height:' + sz + 'px;';
      css += 'top:' + (Math.random() * 100) + '%;';
      css += 'left:' + (Math.random() * 100) + '%;';
      css += 'animation-delay:' + (Math.random() * 6) + 's;';
      css += 'animation-duration:' + (2 + Math.random() * 4) + 's;';
      css += 'opacity:' + (Math.random() * 0.5 + 0.1) + ';';
      s.style.cssText = css;
      sf.appendChild(s);
    }
  })();

  loadFromSheets();
  startAutoRefresh();
</script>
</body>
</html>
